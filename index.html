<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h1 class="mb-4">RSS Reader</h1>

        <form>
          <div class="mb-3">
            <label for="url-input" class="form-label">Ссылка RSS</label>
            <input
              type="url"
              name="url"
              id="url-input"
              class="form-control"
              aria-label="url"
              autocomplete="off"
              required
            />
            <div class="feedback form-text"></div>
          </div>
          <button type="submit" class="btn btn-primary">Добавить</button>
        </form>

        <div class="feeds mt-4"></div>

        <div class="posts mt-4"></div>
      </div>
    </div>
  </div>
  <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalLabel"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          <a href="#" class="btn btn-primary full-article" target="_blank">Читать полностью</a>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/app.js"></script>
</body>
</html>
